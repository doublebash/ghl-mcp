name = "ghl-mcp"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# Non-secret config. Populate ENVIRONMENT in [env.production.vars] etc. if you ever split envs.

# Secrets stored via `wrangler secret put` (see README.md for the full list):
#   GHL_API_TOKEN              — GoHighLevel API token (location-scoped, least-privilege)
#   GHL_LOCATION_ID            — GHL location ID
#   GHL_USER_ID                — GHL user ID (the assigned-to default)
#   GHL_CALENDAR_ID            — Default GHL calendar ID
#   MCP_APPROVAL_CODE          — One-time code the operator pastes in /authorize. NEVER returned to clients.
#   GHL_OAUTH_CLIENT_SECRET    — (Optional) Only if you enable a confidential client. Disabled by default.

[[kv_namespaces]]
binding = "GHL_OAUTH_KV"
id = "1a02a7cf4c244b3caf2d12ae2b665252"

# Per-endpoint rate limiters. All use Cloudflare's unsafe rate-limiter API (no extra cost).
# `limit` is the max requests per `period` seconds, keyed by client IP.
[[unsafe.bindings]]
name = "RATE_LIMIT_APPROVE"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMIT_TOKEN"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 10, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMIT_REGISTER"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 10, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMIT_MCP"
type = "ratelimit"
namespace_id = "1004"
simple = { limit = 60, period = 60 }
